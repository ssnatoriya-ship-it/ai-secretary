<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI秘書</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
.auth-container {
  max-width: 400px;
  margin: 80px auto;
  padding: 32px;
  background: var(--card);
  border-radius: 16px;
  border: 1px solid var(--border);
}
.auth-container h2 { text-align: center; margin-bottom: 24px; font-size: 22px; }
.auth-toggle { text-align: center; margin-top: 16px; font-size: 14px; color: var(--text-muted); }
.auth-toggle a { color: var(--primary); cursor: pointer; text-decoration: underline; }
.auth-error { color: var(--danger); font-size: 13px; margin-bottom: 12px; text-align: center; }
.user-info { font-size: 13px; color: var(--text-muted); margin-left: auto; display: flex; align-items: center; gap: 8px; }
.user-info button { background: none; border: 1px solid rgba(255,255,255,0.3); color: white; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; }
.loading-screen { text-align: center; padding: 80px 20px; color: var(--text-muted); font-size: 16px; }

:root {
  --primary: #4f46e5;
  --primary-light: #818cf8;
  --bg: #f8fafc;
  --card: #ffffff;
  --text: #1e293b;
  --text-muted: #64748b;
  --border: #e2e8f0;
  --danger: #ef4444;
  --success: #22c55e;
  --warning: #f59e0b;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

header {
  background: var(--primary);
  color: white;
  padding: 16px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

header h1 { font-size: 20px; font-weight: 600; }

.app-layout {
  display: flex;
  height: calc(100vh - 56px);
}

nav {
  width: 220px;
  background: var(--card);
  border-right: 1px solid var(--border);
  padding: 16px 0;
  flex-shrink: 0;
}

nav button {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 12px 20px;
  border: none;
  background: none;
  font-size: 15px;
  color: var(--text-muted);
  cursor: pointer;
  text-align: left;
  transition: all 0.15s;
}

nav button:hover { background: #f1f5f9; color: var(--text); }
nav button.active { background: #eef2ff; color: var(--primary); font-weight: 600; border-right: 3px solid var(--primary); }
nav button .icon { font-size: 18px; width: 24px; text-align: center; }

main {
  flex: 1;
  padding: 24px;
  overflow-y: auto;
}

.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.section-header h2 { font-size: 22px; font-weight: 600; }

.btn {
  padding: 8px 16px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
  font-weight: 500;
  transition: all 0.15s;
}

.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: #4338ca; }
.btn-danger { background: var(--danger); color: white; }
.btn-danger:hover { background: #dc2626; }
.btn-ghost { background: none; color: var(--text-muted); padding: 4px 8px; }
.btn-ghost:hover { color: var(--danger); }

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 12px;
  transition: box-shadow 0.15s;
}

.card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }

/* Dashboard */
.dashboard-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 20px;
}

.dashboard-card { padding: 20px; }
.dashboard-card h3 { font-size: 14px; color: var(--text-muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
.stat { font-size: 32px; font-weight: 700; color: var(--primary); }
.stat-label { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

.upcoming-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}

.upcoming-item:last-child { border-bottom: none; }
.upcoming-time { font-size: 13px; color: var(--primary); font-weight: 600; min-width: 50px; }
.upcoming-title { font-size: 14px; }

/* Schedule */
.schedule-date-nav {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
}

.schedule-date-nav button {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 12px;
  cursor: pointer;
  font-size: 16px;
}

.schedule-date-nav span { font-size: 18px; font-weight: 600; }

.schedule-item {
  display: flex;
  gap: 16px;
  align-items: flex-start;
}

.schedule-item .time {
  min-width: 80px;
  font-size: 14px;
  font-weight: 600;
  color: var(--primary);
  padding-top: 2px;
}

.schedule-item .content { flex: 1; }
.schedule-item .title { font-size: 15px; font-weight: 500; }
.schedule-item .desc { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
.schedule-item .actions { display: flex; gap: 4px; }

/* Tasks */
.task-item {
  display: flex;
  align-items: center;
  gap: 12px;
}

.task-item input[type="checkbox"] {
  width: 20px;
  height: 20px;
  accent-color: var(--primary);
  cursor: pointer;
}

.task-item.done .task-text { text-decoration: line-through; color: var(--text-muted); }
.task-text { flex: 1; font-size: 15px; }
.task-priority {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 12px;
  font-weight: 600;
}

.priority-high { background: #fef2f2; color: var(--danger); }
.priority-medium { background: #fffbeb; color: var(--warning); }
.priority-low { background: #f0fdf4; color: var(--success); }

.task-due { font-size: 12px; color: var(--text-muted); }

/* Memos */
.memo-item .memo-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
.memo-item .memo-preview { font-size: 14px; color: var(--text-muted); line-height: 1.5; }
.memo-item .memo-date { font-size: 12px; color: var(--text-muted); margin-top: 8px; }

/* Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}

.modal {
  background: var(--card);
  border-radius: 16px;
  padding: 24px;
  width: 90%;
  max-width: 480px;
  max-height: 90vh;
  overflow-y: auto;
}

.modal h3 { font-size: 18px; margin-bottom: 20px; }

.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  font-family: inherit;
}

.form-group textarea { min-height: 120px; resize: vertical; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}

.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 15px; }

.filter-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}

.filter-btn {
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: var(--card);
  font-size: 13px;
  cursor: pointer;
  color: var(--text-muted);
}

.filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

.ai-actions { display: flex; gap: 8px; margin-bottom: 16px; }
.btn-ai {
  padding: 8px 14px;
  border: 1px solid var(--primary-light);
  border-radius: 8px;
  background: #eef2ff;
  color: var(--primary);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-ai:hover { background: var(--primary); color: white; }
.btn-ai:disabled { opacity: 0.5; cursor: not-allowed; }

.ai-result {
  background: #eef2ff;
  border: 1px solid var(--primary-light);
  border-radius: 8px;
  padding: 14px;
  margin-bottom: 16px;
  font-size: 14px;
  line-height: 1.6;
}

.ai-result h4 { font-size: 13px; color: var(--primary); margin-bottom: 8px; }
.ai-result .loading { color: var(--text-muted); font-style: italic; }

.ai-task-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}

.ai-task-item:last-child { border-bottom: none; }
.ai-task-item input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--primary); }
.ai-task-item span { flex: 1; font-size: 14px; }

.settings-section { max-width: 500px; }
.settings-section .form-group { margin-bottom: 20px; }
.api-key-input { font-family: monospace; }
.api-status { font-size: 13px; margin-top: 6px; }
.api-status.ok { color: var(--success); }
.api-status.ng { color: var(--danger); }

.voice-area {
  margin-top: 20px;
}

.mic-btn {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  border: none;
  background: var(--primary);
  color: white;
  font-size: 28px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 16px;
  box-shadow: 0 4px 12px rgba(79,70,229,0.3);
}

.mic-btn:hover { transform: scale(1.05); }
.mic-btn.recording {
  background: var(--danger);
  animation: pulse 1.5s infinite;
  box-shadow: 0 4px 12px rgba(239,68,68,0.4);
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

.voice-status {
  text-align: center;
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 12px;
}

.voice-transcript {
  background: #f1f5f9;
  border-radius: 8px;
  padding: 12px;
  font-size: 14px;
  margin-bottom: 12px;
  min-height: 40px;
}

.voice-response {
  background: #eef2ff;
  border: 1px solid var(--primary-light);
  border-radius: 8px;
  padding: 14px;
  font-size: 14px;
  line-height: 1.8;
  white-space: pre-wrap;
}

@media (max-width: 768px) {
  .app-layout { flex-direction: column; }
  nav { width: 100%; display: flex; padding: 0; border-right: none; border-bottom: 1px solid var(--border); }
  nav button { flex: 1; padding: 10px 4px; white-space: nowrap; border-right: none !important; font-size: 12px; justify-content: center; }
  nav button .icon { font-size: 16px; width: auto; }
  nav button.active { border-bottom: 3px solid var(--primary); border-right: none; }
  main { height: calc(100vh - 56px - 48px); }
}
</style>
</head>
<body>

<header>
  <span style="font-size:24px">&#128188;</span>
  <h1>AI秘書</h1>
  <div class="user-info" id="user-info"></div>
</header>

<div id="app-root"></div>

<script>
var SUPABASE_URL = 'https://yipvyvzqobfwjjaowwah.supabase.co';
var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlpcHZ5dnpxb2Jmd2pqYW93d2FoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NjE1MjMsImV4cCI6MjA5ODIzNzUyM30.3lU1TogK3PPTvvFQ53pB_ipwzT3tIUoiI0v8G7NGci4';

var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

var App = {
  currentView: 'dashboard',
  scheduleDate: new Date(),
  taskFilter: 'all',
  user: null,
  cache: { schedules: null, tasks: null, memos: null },
};

const Store = {
  async get(name) {
    const colMap = { schedules: 'schedules', tasks: 'tasks', memos: 'memos' };
    const table = colMap[name];
    const { data, error } = await sb.from(table).select('*').order('created_at', { ascending: true });
    if (error) { console.error(error); return []; }
    return data.map(r => Store._fromDb(name, r));
  },
  _fromDb(name, r) {
    if (name === 'schedules') return { id: r.id, title: r.title, date: r.date, startTime: r.start_time || '', endTime: r.end_time || '', description: r.description || '', createdAt: r.created_at, updatedAt: r.updated_at };
    if (name === 'tasks') return { id: r.id, title: r.title, priority: r.priority || 'medium', dueDate: r.due_date || '', description: r.description || '', done: r.done || false, createdAt: r.created_at, updatedAt: r.updated_at };
    if (name === 'memos') return { id: r.id, title: r.title, content: r.content || '', createdAt: r.created_at, updatedAt: r.updated_at };
    return r;
  },
  _toDb(name, item) {
    const base = { user_id: App.user.id };
    if (name === 'schedules') return { ...base, title: item.title, date: item.date, start_time: item.startTime, end_time: item.endTime, description: item.description };
    if (name === 'tasks') return { ...base, title: item.title, priority: item.priority, due_date: item.dueDate || null, description: item.description, done: item.done || false };
    if (name === 'memos') return { ...base, title: item.title, content: item.content };
    return item;
  },
  async add(name, item) {
    const row = Store._toDb(name, item);
    const { data, error } = await sb.from(name).insert(row).select().single();
    if (error) { console.error(error); alert('保存に失敗しました: ' + error.message); return null; }
    return Store._fromDb(name, data);
  },
  async update(name, id, updates) {
    const partial = {};
    if (updates.title !== undefined) partial.title = updates.title;
    if (updates.description !== undefined) partial.description = updates.description;
    if (updates.content !== undefined) partial.content = updates.content;
    if (updates.done !== undefined) partial.done = updates.done;
    if (name === 'schedules') {
      if (updates.date !== undefined) partial.date = updates.date;
      if (updates.startTime !== undefined) partial.start_time = updates.startTime;
      if (updates.endTime !== undefined) partial.end_time = updates.endTime;
    }
    if (name === 'tasks') {
      if (updates.priority !== undefined) partial.priority = updates.priority;
      if (updates.dueDate !== undefined) partial.due_date = updates.dueDate || null;
    }
    partial.updated_at = new Date().toISOString();
    const { error } = await sb.from(name).update(partial).eq('id', id);
    if (error) { console.error(error); alert('更新に失敗しました'); }
  },
  async remove(name, id) {
    const { error } = await sb.from(name).delete().eq('id', id);
    if (error) { console.error(error); alert('削除に失敗しました'); }
  },
  async find(name, id) {
    const { data, error } = await sb.from(name).select('*').eq('id', id).single();
    if (error) return null;
    return Store._fromDb(name, data);
  },
};

// Auth
function renderAuth() {
  document.getElementById('app-root').innerHTML = `
    <div class="auth-container" id="auth-box">
      <h2>&#128188; AI秘書にログイン</h2>
      <div id="auth-error"></div>
      <div class="form-group"><label>メールアドレス</label><input id="auth-email" type="email" placeholder="you@example.com"></div>
      <div class="form-group"><label>パスワード</label><input id="auth-password" type="password" placeholder="6文字以上"></div>
      <button class="btn btn-primary" style="width:100%;padding:12px" onclick="handleAuth('login')">ログイン</button>
      <div class="auth-toggle" id="auth-forgot"><a onclick="showResetPassword()">パスワードを忘れた方</a></div>
      <div class="auth-toggle" id="auth-toggle">アカウントをお持ちでない方は<a onclick="switchAuthMode()">新規登録</a></div>
    </div>`;
  App._authMode = 'login';
}

function switchAuthMode() {
  App._authMode = App._authMode === 'login' ? 'signup' : 'login';
  const btn = document.querySelector('.auth-container .btn-primary');
  const toggle = document.getElementById('auth-toggle');
  if (App._authMode === 'signup') {
    btn.textContent = '新規登録';
    btn.setAttribute('onclick', "handleAuth('signup')");
    toggle.innerHTML = 'すでにアカウントをお持ちの方は<a onclick="switchAuthMode()">ログイン</a>';
  } else {
    btn.textContent = 'ログイン';
    btn.setAttribute('onclick', "handleAuth('login')");
    toggle.innerHTML = 'アカウントをお持ちでない方は<a onclick="switchAuthMode()">新規登録</a>';
  }
}

async function handleAuth(mode) {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const errEl = document.getElementById('auth-error');
  errEl.textContent = '';
  if (!email || !password) { errEl.textContent = 'メールアドレスとパスワードを入力してください'; return; }
  if (password.length < 6) { errEl.textContent = 'パスワードは6文字以上にしてください'; return; }

  let result;
  if (mode === 'signup') {
    result = await sb.auth.signUp({ email, password });
    if (!result.error && result.data.user) {
      errEl.innerHTML = '<span style="color:var(--success)">登録完了！確認メールを送信しました。メールのリンクをクリックしてからログインしてください。</span>';
      return;
    }
  } else {
    result = await sb.auth.signInWithPassword({ email, password });
  }
  if (result.error) {
    errEl.textContent = result.error.message;
    return;
  }
  App.user = result.data.user;
  initApp();
}

function showResetPassword() {
  document.getElementById('app-root').innerHTML = `
    <div class="auth-container">
      <h2>パスワードリセット</h2>
      <div id="auth-error"></div>
      <p style="font-size:14px;color:var(--text-muted);margin-bottom:16px">登録済みのメールアドレスを入力してください。パスワードリセット用のリンクを送信します。</p>
      <div class="form-group"><label>メールアドレス</label><input id="reset-email" type="email" placeholder="you@example.com"></div>
      <button class="btn btn-primary" style="width:100%;padding:12px" onclick="sendResetEmail()">リセットメールを送信</button>
      <div class="auth-toggle"><a onclick="renderAuth()">ログイン画面に戻る</a></div>
    </div>`;
}

async function sendResetEmail() {
  const email = document.getElementById('reset-email').value.trim();
  const errEl = document.getElementById('auth-error');
  errEl.textContent = '';
  if (!email) { errEl.textContent = 'メールアドレスを入力してください'; return; }
  const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: location.origin });
  if (error) { errEl.textContent = error.message; return; }
  errEl.innerHTML = '<span style="color:var(--success)">リセットメールを送信しました。メールのリンクからパスワードを再設定してください。</span>';
}

function showUpdatePassword() {
  document.getElementById('app-root').innerHTML = `
    <div class="auth-container">
      <h2>新しいパスワードを設定</h2>
      <div id="auth-error"></div>
      <div class="form-group"><label>新しいパスワード</label><input id="new-password" type="password" placeholder="6文字以上"></div>
      <button class="btn btn-primary" style="width:100%;padding:12px" onclick="updatePassword()">パスワードを更新</button>
    </div>`;
}

async function updatePassword() {
  const password = document.getElementById('new-password').value;
  const errEl = document.getElementById('auth-error');
  errEl.textContent = '';
  if (!password || password.length < 6) { errEl.textContent = 'パスワードは6文字以上にしてください'; return; }
  const { error } = await sb.auth.updateUser({ password });
  if (error) { errEl.textContent = error.message; return; }
  errEl.innerHTML = '<span style="color:var(--success)">パスワードを更新しました。</span>';
  setTimeout(() => { const s = sb.auth.getSession().then(r => { if(r.data.session) { App.user = r.data.session.user; initApp(); } }); }, 1500);
}

async function handleLogout() {
  await sb.auth.signOut();
  App.user = null;
  document.getElementById('user-info').innerHTML = '';
  renderAuth();
}

function showAppLayout() {
  document.getElementById('app-root').innerHTML = `<div class="app-layout"><nav id="nav"></nav><main id="main"></main></div>`;
  document.getElementById('user-info').innerHTML = `
    <span>${esc(App.user.email)}</span>
    <button onclick="handleLogout()">ログアウト</button>`;
}

const navItems = [
  { id: 'dashboard', icon: '&#9679;', label: 'ダッシュボード' },
  { id: 'schedule', icon: '&#128197;', label: 'スケジュール' },
  { id: 'tasks', icon: '&#9745;', label: 'タスク' },
  { id: 'memos', icon: '&#128221;', label: 'メモ' },
  { id: 'settings', icon: '&#9881;', label: '設定' },
];

function renderNav() {
  document.getElementById('nav').innerHTML = navItems.map(n =>
    `<button class="${App.currentView === n.id ? 'active' : ''}" onclick="navigate('${n.id}')"><span class="icon">${n.icon}</span>${n.label}</button>`
  ).join('');
}

function navigate(view) {
  App.currentView = view;
  renderNav();
  renderMain();
}

function renderMain() {
  const views = { dashboard: renderDashboard, schedule: renderSchedule, tasks: renderTasks, memos: renderMemos, settings: renderSettings };
  (views[App.currentView] || views.dashboard)();
}

function formatDate(d) {
  const dt = new Date(d);
  return `${dt.getFullYear()}/${(dt.getMonth()+1).toString().padStart(2,'0')}/${dt.getDate().toString().padStart(2,'0')}`;
}

function formatDateJP(d) {
  const dt = new Date(d);
  const days = ['日','月','火','水','木','金','土'];
  return `${dt.getFullYear()}年${dt.getMonth()+1}月${dt.getDate()}日(${days[dt.getDay()]})`;
}

function dateStr(d) {
  const dt = new Date(d);
  return `${dt.getFullYear()}-${(dt.getMonth()+1).toString().padStart(2,'0')}-${dt.getDate().toString().padStart(2,'0')}`;
}

// Voice
let voiceRecognition = null;
let isRecording = false;

function toggleVoice() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    document.getElementById('voice-status').textContent = 'お使いのブラウザは音声認識に対応していません';
    return;
  }
  if (isRecording) {
    voiceRecognition.stop();
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  voiceRecognition = new SR();
  voiceRecognition.lang = 'ja-JP';
  voiceRecognition.continuous = false;
  voiceRecognition.interimResults = true;

  voiceRecognition.onstart = () => {
    isRecording = true;
    document.getElementById('mic-btn').classList.add('recording');
    document.getElementById('voice-status').textContent = '聞いています...';
    document.getElementById('voice-response-area').innerHTML = '';
  };

  voiceRecognition.onresult = (e) => {
    let transcript = '';
    for (let i = 0; i < e.results.length; i++) {
      transcript += e.results[i][0].transcript;
    }
    document.getElementById('voice-transcript-area').innerHTML =
      `<div class="voice-transcript">${esc(transcript)}</div>`;
    if (e.results[0].isFinal) {
      processVoiceCommand(transcript);
    }
  };

  voiceRecognition.onerror = (e) => {
    isRecording = false;
    document.getElementById('mic-btn').classList.remove('recording');
    document.getElementById('voice-status').textContent =
      e.error === 'not-allowed' ? 'マイクの使用が許可されていません。ブラウザの設定を確認してください。' : 'エラーが発生しました。もう一度お試しください。';
  };

  voiceRecognition.onend = () => {
    isRecording = false;
    document.getElementById('mic-btn').classList.remove('recording');
    if (document.getElementById('voice-status').textContent === '聞いています...') {
      document.getElementById('voice-status').textContent = 'マイクボタンを押して話しかけてください';
    }
  };

  voiceRecognition.start();
}

async function processVoiceCommand(text) {
  document.getElementById('voice-status').textContent = 'AIが処理中...';
  const responseArea = document.getElementById('voice-response-area');
  responseArea.innerHTML = '<div class="voice-response"><div class="loading">考え中...</div></div>';

  const today = dateStr(new Date());
  const schedules = await Store.get('schedules');
  const tasks = (await Store.get('tasks')).filter(t => !t.done);

  const prompt = `あなたはAI秘書です。ユーザーの音声指示に対応してください。
今日は${formatDateJP(new Date())}です。

【現在の予定】
${schedules.filter(s => s.date >= today).sort((a,b) => a.date.localeCompare(b.date)).slice(0,10).map(s => `・${s.date} ${s.startTime} ${s.title}`).join('\n') || 'なし'}

【未完了タスク】
${tasks.map(t => `・[${({high:'高',medium:'中',low:'低'})[t.priority]||'中'}] ${t.title}${t.dueDate ? '（期限:'+t.dueDate+'）' : ''}`).join('\n') || 'なし'}

ユーザーの指示: 「${text}」

以下のルールに従って回答してください：
1. 予定の追加が求められた場合、JSON形式で返してください：
   {"action":"add_schedule","date":"YYYY-MM-DD","startTime":"HH:MM","endTime":"HH:MM","title":"タイトル","description":""}
2. タスクの追加が求められた場合：
   {"action":"add_task","title":"タスク名","priority":"high|medium|low","dueDate":"YYYY-MM-DD"}
3. メモの追加が求められた場合：
   {"action":"add_memo","title":"タイトル","content":"内容"}
4. 複数の操作がある場合は配列で返してください：[{...},{...}]
5. 情報の質問や確認の場合は、普通のテキストで回答してください（JSONなし）。
6. 回答は簡潔に、親しみやすい丁寧語で。`;

  try {
    const result = await callClaude(prompt);
    let actions = [];
    try {
      const jsonMatch = result.match(/\[[\s\S]*\]/) || result.match(/\{[\s\S]*\}/);
      if (jsonMatch) {
        const parsed = JSON.parse(jsonMatch[0]);
        actions = Array.isArray(parsed) ? parsed : [parsed];
      }
    } catch(e) {}

    let messages = [];
    for (const a of actions) {
      if (a.action === 'add_schedule') {
        await Store.add('schedules', { title: a.title, date: a.date, startTime: a.startTime || '', endTime: a.endTime || '', description: a.description || '' });
        messages.push(`予定「${a.title}」を${a.date}に追加しました。`);
      } else if (a.action === 'add_task') {
        await Store.add('tasks', { title: a.title, priority: a.priority || 'medium', dueDate: a.dueDate || '', description: '', done: false });
        messages.push(`タスク「${a.title}」を追加しました。`);
      } else if (a.action === 'add_memo') {
        await Store.add('memos', { title: a.title, content: a.content || '' });
        messages.push(`メモ「${a.title}」を保存しました。`);
      }
    }

    if (messages.length > 0) {
      responseArea.innerHTML = `<div class="voice-response">${messages.map(m => '&#10003; ' + esc(m)).join('<br>')}</div>`;
      renderDashboard();
    } else {
      const cleanResult = result.replace(/```json[\s\S]*?```/g, '').replace(/\{[\s\S]*?\}/g, '').trim() || result;
      responseArea.innerHTML = `<div class="voice-response">${esc(actions.length ? result : cleanResult)}</div>`;
    }

    document.getElementById('voice-status').textContent = 'マイクボタンを押して話しかけてください';
  } catch (e) {
    responseArea.innerHTML = `<div class="voice-response" style="border-color:var(--danger)">${esc(e.message)}</div>`;
    document.getElementById('voice-status').textContent = 'エラーが発生しました';
  }
}

function getApiKey() {
  return App._cachedApiKey || localStorage.getItem('secretary_apikey') || '';
}

async function loadApiKeyFromDb() {
  const { data } = await sb.from('user_settings').select('claude_api_key').single();
  if (data && data.claude_api_key) {
    App._cachedApiKey = data.claude_api_key;
    localStorage.setItem('secretary_apikey', data.claude_api_key);
  }
}

async function saveApiKeyToDb(key) {
  const { data: existing } = await sb.from('user_settings').select('id').single();
  if (existing) {
    await sb.from('user_settings').update({ claude_api_key: key, updated_at: new Date().toISOString() }).eq('user_id', App.user.id);
  } else {
    await sb.from('user_settings').insert({ user_id: App.user.id, claude_api_key: key });
  }
  App._cachedApiKey = key;
  localStorage.setItem('secretary_apikey', key);
}

async function callClaude(prompt) {
  const apiKey = getApiKey();
  if (!apiKey) {
    alert('APIキーが設定されていません。設定タブからClaude APIキーを入力してください。');
    return null;
  }
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1024,
      messages: [{ role: 'user', content: prompt }],
    }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `API error: ${res.status}`);
  }
  const data = await res.json();
  return data.content[0].text;
}

async function aiSummarize(memoId) {
  const memo = await Store.find('memos', memoId);
  if (!memo) return;
  const area = document.getElementById('ai-result-area');
  area.innerHTML = '<div class="ai-result"><div class="loading">要約を生成中...</div></div>';
  try {
    const result = await callClaude(
      `以下のメモを簡潔に要約してください。要約のみを返してください。\n\nタイトル: ${memo.title}\n\n${memo.content}`
    );
    area.innerHTML = `<div class="ai-result"><h4>&#9733; AI要約</h4>${esc(result)}</div>`;
  } catch (e) {
    area.innerHTML = `<div class="ai-result" style="border-color:var(--danger)"><h4 style="color:var(--danger)">エラー</h4>${esc(e.message)}</div>`;
  }
}

async function aiToTasks(memoId) {
  const memo = await Store.find('memos', memoId);
  if (!memo) return;
  const area = document.getElementById('ai-result-area');
  area.innerHTML = '<div class="ai-result"><div class="loading">タスクを抽出中...</div></div>';
  try {
    const result = await callClaude(
      `以下のメモからタスク（やるべきこと）を抽出してください。JSON配列で返してください。各要素は {"title": "タスク名", "priority": "high"|"medium"|"low"} の形式です。JSON配列のみを返し、他のテキストは含めないでください。\n\nタイトル: ${memo.title}\n\n${memo.content}`
    );
    let tasks;
    try {
      const jsonMatch = result.match(/\[[\s\S]*\]/);
      tasks = JSON.parse(jsonMatch ? jsonMatch[0] : result);
    } catch(e) { tasks = []; }
    if (!tasks.length) {
      area.innerHTML = '<div class="ai-result"><h4>&#9745; タスク抽出</h4>タスクが見つかりませんでした。</div>';
      return;
    }
    App._pendingTasks = tasks;
    area.innerHTML = `<div class="ai-result">
      <h4>&#9745; 抽出されたタスク（チェックして登録）</h4>
      ${tasks.map((t, i) => `<div class="ai-task-item">
        <input type="checkbox" id="ai-task-${i}" checked>
        <span>${esc(t.title)}</span>
        <span class="task-priority priority-${t.priority}">${{high:'高',medium:'中',low:'低'}[t.priority]||'中'}</span>
      </div>`).join('')}
      <div style="margin-top:12px;text-align:right">
        <button class="btn btn-primary" onclick="registerAiTasks()">選択したタスクを登録</button>
      </div>
    </div>`;
  } catch (e) {
    area.innerHTML = `<div class="ai-result" style="border-color:var(--danger)"><h4 style="color:var(--danger)">エラー</h4>${esc(e.message)}</div>`;
  }
}

async function registerAiTasks() {
  const tasks = App._pendingTasks || [];
  let count = 0;
  for (let i = 0; i < tasks.length; i++) {
    const cb = document.getElementById(`ai-task-${i}`);
    if (cb && cb.checked) {
      await Store.add('tasks', { title: tasks[i].title, priority: tasks[i].priority || 'medium', dueDate: '', description: '', done: false });
      count++;
    }
  }
  delete App._pendingTasks;
  const area = document.getElementById('ai-result-area');
  area.innerHTML = `<div class="ai-result"><h4 style="color:var(--success)">&#10003; ${count}件のタスクを登録しました</h4></div>`;
}

// Settings
function renderSettings() {
  const apiKey = getApiKey();
  document.getElementById('main').innerHTML = `
    <div class="section-header"><h2>設定</h2></div>
    <div class="settings-section">
      <div class="card" style="padding:20px">
        <h3 style="font-size:16px;margin-bottom:16px">Claude API設定</h3>
        <div class="form-group">
          <label>APIキー</label>
          <input id="f-apikey" class="api-key-input" type="password" placeholder="sk-ant-..." value="${apiKey ? '••••••••' : ''}">
          <div id="api-status" class="api-status">${apiKey ? '<span class="ok">&#10003; 設定済み</span>' : '<span class="ng">未設定</span>'}</div>
        </div>
        <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px">メモのAI要約・タスク変換機能に使用します。APIキーはブラウザのローカルストレージに保存されます。</p>
        <div style="display:flex;gap:8px">
          <button class="btn btn-primary" onclick="saveApiKey()">保存</button>
          ${apiKey ? '<button class="btn btn-danger" onclick="clearApiKey()">削除</button>' : ''}
        </div>
      </div>
    </div>
  `;
}

async function saveApiKey() {
  const input = document.getElementById('f-apikey');
  const val = input.value.trim();
  if (!val || val === '••••••••') return alert('新しいAPIキーを入力してください');
  await saveApiKeyToDb(val);
  renderSettings();
}

async function clearApiKey() {
  if (confirm('APIキーを削除しますか？')) {
    await saveApiKeyToDb('');
    App._cachedApiKey = '';
    localStorage.removeItem('secretary_apikey');
    renderSettings();
  }
}

// Shared
async function deleteItem(store, id, renderFn) {
  if (confirm('削除しますか?')) {
    await Store.remove(store, id);
    window[renderFn]();
  }
}

function showModal(html) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = e => { if (e.target === overlay) closeModal(); };
  overlay.innerHTML = `<div class="modal">${html}</div>`;
  document.body.appendChild(overlay);
}

function closeModal() {
  document.querySelector('.modal-overlay')?.remove();
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function initApp() {
  showAppLayout();
  renderNav();
  renderMain();
  loadApiKeyFromDb();
}

(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    App.user = session.user;
    initApp();
  } else {
    renderAuth();
  }
  sb.auth.onAuthStateChange((event, session) => {
    if (event === 'PASSWORD_RECOVERY') {
      showUpdatePassword();
    } else if (event === 'SIGNED_IN' && session) {
      App.user = session.user;
      initApp();
    } else if (event === 'SIGNED_OUT') {
      App.user = null;
      document.getElementById('user-info').innerHTML = '';
      renderAuth();
    }
  });
})();
</script>
